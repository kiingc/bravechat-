<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BraveChat — Coach Masculino IA</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --black: #0a0a0a; --yellow: #e8ff00; --white: #f5f5f0; --gray: #1a1a1a; --red: #ff3b30; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  #landing { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; position: relative; }
  #landing::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at 50% 0%, rgba(232,255,0,0.08) 0%, transparent 60%); pointer-events: none; }
  .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: clamp(52px, 15vw, 90px); letter-spacing: 2px; line-height: 1; margin-bottom: 8px; }
  .logo-text span { color: var(--yellow); }
  .tagline { font-size: 14px; color: #666; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }
  .features { list-style: none; margin-bottom: 40px; text-align: left; width: 100%; max-width: 320px; }
  .features li { padding: 8px 0; font-size: 15px; color: #aaa; display: flex; align-items: center; gap: 10px; }
  .features li::before { content: '▸'; color: var(--yellow); font-size: 12px; }
  .trial-badge { background: rgba(232,255,0,0.1); border: 1px solid rgba(232,255,0,0.3); color: var(--yellow); padding: 8px 20px; border-radius: 100px; font-size: 13px; margin-bottom: 16px; display: inline-block; }
  .btn-primary { background: var(--yellow); color: var(--black); border: none; padding: 18px 40px; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; border-radius: 4px; cursor: pointer; width: 100%; max-width: 320px; transition: all 0.2s; display: block; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(232,255,0,0.3); }
  .price-note { font-size: 12px; color: #555; margin-top: 10px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
  .modal { background: var(--gray); border-radius: 20px 20px 0 0; padding: 32px 24px 48px; width: 100%; max-width: 480px; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 40px; height: 4px; background: #444; border-radius: 2px; margin: 0 auto 24px; }
  .modal h2 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1px; margin-bottom: 6px; }
  .modal h2 span { color: var(--yellow); }
  .modal-subtitle { font-size: 13px; color: #666; margin-bottom: 28px; }
  .tab-switch { display: flex; background: var(--black); border-radius: 8px; padding: 4px; margin-bottom: 24px; }
  .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: #666; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
  .tab-btn.active { background: var(--yellow); color: var(--black); font-weight: 600; }
  .input-group { margin-bottom: 14px; }
  .input-group label { display: block; font-size: 12px; color: #666; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
  .input-group input { width: 100%; background: var(--black); border: 1px solid #333; color: var(--white); padding: 14px 16px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; }
  .input-group input:focus { border-color: var(--yellow); }
  .btn-google { width: 100%; background: var(--black); border: 1px solid #333; color: var(--white); padding: 14px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 16px; transition: border-color 0.2s; }
  .btn-google:hover { border-color: #555; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; color: #444; font-size: 12px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #333; }
  .btn-submit { width: 100%; background: var(--yellow); color: var(--black); border: none; padding: 16px; border-radius: 8px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; cursor: pointer; margin-top: 8px; }
  .error-msg { color: var(--red); font-size: 13px; margin-top: 8px; text-align: center; display: none; }
  .close-modal { position: absolute; top: 16px; right: 16px; background: #333; border: none; color: #fff; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; }
  #app { display: none; min-height: 100vh; flex-direction: column; }
  .app-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; background: var(--black); z-index: 10; }
  .app-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; }
  .app-logo span { color: var(--yellow); }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .badge-trial { background: rgba(232,255,0,0.1); border: 1px solid rgba(232,255,0,0.3); color: var(--yellow); padding: 4px 10px; border-radius: 100px; font-size: 11px; cursor: pointer; }
  .badge-premium { background: var(--yellow); color: var(--black); padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; }
  .btn-logout { background: transparent; border: 1px solid #333; color: #666; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .chat-area { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }
  .msg { display: flex; gap: 10px; max-width: 88%; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--yellow); color: var(--black); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 16px; flex-shrink: 0; }
  .msg.user .msg-avatar { background: #2a2a2a; color: #fff; }
  .msg-bubble { background: var(--gray); padding: 12px 16px; border-radius: 16px; font-size: 15px; line-height: 1.5; color: var(--white); }
  .msg.user .msg-bubble { background: #1e1e1e; border: 1px solid #2a2a2a; }
  .typing { display: flex; gap: 4px; padding: 14px 16px; background: var(--gray); border-radius: 16px; width: fit-content; }
  .typing span { width: 6px; height: 6px; background: var(--yellow); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
  .chat-input-area { padding: 12px 16px 24px; border-top: 1px solid #1a1a1a; background: var(--black); }
  .chat-input-wrap { display: flex; gap: 10px; align-items: flex-end; background: var(--gray); border-radius: 14px; padding: 10px 14px; border: 1px solid #2a2a2a; }
  .chat-input { flex: 1; background: transparent; border: none; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 15px; resize: none; outline: none; max-height: 120px; line-height: 1.4; }
  .chat-input::placeholder { color: #555; }
  .btn-send { background: var(--yellow); border: none; width: 36px; height: 36px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .btn-send:disabled { opacity: 0.4; cursor: default; }
  #paywall { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; }
  .paywall-icon { font-size: 48px; margin-bottom: 20px; }
  .paywall h2 { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 1px; margin-bottom: 10px; }
  .paywall h2 span { color: var(--yellow); }
  .paywall p { color: #666; font-size: 15px; margin-bottom: 32px; max-width: 280px; line-height: 1.5; }
  .paywall-price { font-family: 'Bebas Neue', sans-serif; font-size: 52px; color: var(--yellow); margin-bottom: 8px; }
  .paywall-price small { font-family: 'DM Sans', sans-serif; font-size: 16px; color: #666; }
  #admin-panel { display: none; min-height: 100vh; padding: 24px 16px; }
  .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .admin-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; }
  .admin-title span { color: var(--yellow); }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--gray); border-radius: 12px; padding: 16px; border: 1px solid #2a2a2a; }
  .stat-number { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--yellow); }
  .stat-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
  .users-list { background: var(--gray); border-radius: 12px; overflow: hidden; border: 1px solid #2a2a2a; }
  .users-list-header { padding: 14px 16px; font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #2a2a2a; }
  .user-item { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; }
  .user-item:last-child { border-bottom: none; }
  .user-email { font-size: 13px; color: #aaa; }
  .user-badge { font-size: 11px; padding: 3px 8px; border-radius: 100px; }
  .user-badge.premium { background: rgba(232,255,0,0.15); color: var(--yellow); }
  .user-badge.trial { background: rgba(255,255,255,0.05); color: #666; }
  .user-badge.staff { background: rgba(100,200,255,0.15); color: #64c8ff; }
  .btn-chat { background: var(--yellow); color: var(--black); border: none; padding: 10px 20px; border-radius: 8px; font-family: 'Bebas Neue', sans-serif; font-size: 16px; cursor: pointer; margin-top: 20px; width: 100%; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="landing">
  <div class="logo-text">BRAVE<span>CHAT</span></div>
  <div class="tagline">Coach Masculino · Disponível 24/7</div>
  <ul class="features">
    <li>Supera a timidez de vez</li>
    <li>Aprende a falar com mulheres</li>
    <li>Melhora as tuas DMs</li>
    <li>Desenvolve mentalidade de vencedor</li>
    <li>Constrói uma vida com direção</li>
  </ul>
  <div class="trial-badge">🔥 3 dias grátis — sem cartão</div>
  <button class="btn-primary" onclick="openAuth()">Começar agora</button>
  <p class="price-note">Após o trial: 9,99€/mês</p>
</div>
